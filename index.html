<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>恋爱大师 - 智能话术助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%); min-height: 100vh; padding-bottom: 100px; }
        .header { background: rgba(255,255,255,0.95); padding: 15px 20px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 20px rgba(0,0,0,0.1); }
        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #ff6b9d, #c44569); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .logo-text { font-size: 20px; font-weight: bold; color: #c44569; }
        .header-actions { display: flex; gap: 10px; }
        .icon-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: #f5f5f5; cursor: pointer; font-size: 20px; transition: all 0.3s; }
        .icon-btn:hover, .icon-btn.active { background: #ff6b9d; }
        .mode-tabs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; }
        .mode-tab { padding: 10px 20px; border-radius: 20px; border: none; background: #f0f0f0; color: #666; font-size: 14px; cursor: pointer; white-space: nowrap; transition: all 0.3s; }
        .mode-tab.active { background: linear-gradient(135deg, #ff6b9d, #c44569); color: white; }
        .main-content { padding: 15px; max-width: 600px; margin: 0 auto; }
        .persona-section, .category-section, .phrases-section, .ranking-section, .favorites-section { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .section-title { font-size: 16px; color: #333; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .persona-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .persona-item { display: flex; flex-direction: column; align-items: center; padding: 12px 8px; border-radius: 15px; background: #f8f8f8; cursor: pointer; transition: all 0.3s; border: 2px solid transparent; }
        .persona-item:hover { transform: translateY(-3px); }
        .persona-item.active { background: linear-gradient(135deg, #fff0f3, #ffe4ec); border-color: #ff6b9d; }
        .persona-emoji { font-size: 28px; margin-bottom: 5px; }
        .persona-name { font-size: 12px; color: #666; text-align: center; }
        .persona-item.active .persona-name { color: #c44569; font-weight: bold; }
        .category-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .category-item { display: flex; flex-direction: column; align-items: center; padding: 15px 10px; border-radius: 15px; background: linear-gradient(135deg, #f8f9ff, #fff5f8); cursor: pointer; transition: all 0.3s; border: 1px solid #f0f0f0; }
        .category-item:hover, .category-item.active { transform: scale(1.05); box-shadow: 0 5px 15px rgba(255,107,157,0.2); border-color: #ff6b9d; }
        .category-emoji { font-size: 32px; margin-bottom: 8px; }
        .category-name { font-size: 13px; color: #333; font-weight: 500; }
        .phrases-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .filter-tabs { display: flex; gap: 8px; }
        .filter-tab { padding: 6px 12px; border-radius: 15px; border: none; background: #f0f0f0; color: #666; font-size: 12px; cursor: pointer; }
        .filter-tab.active { background: #ff6b9d; color: white; }
        .phrase-card { background: linear-gradient(135deg, #fff9fb, #fff0f5); border-radius: 15px; padding: 15px; margin-bottom: 12px; border-left: 4px solid #ff6b9d; position: relative; transition: all 0.3s; }
        .phrase-card:hover { transform: translateX(5px); box-shadow: 0 5px 20px rgba(255,107,157,0.15); }
        .phrase-text { color: #333; font-size: 15px; line-height: 1.6; margin-bottom: 10px; }
        .phrase-meta { display: flex; justify-content: space-between; align-items: center; }
        .phrase-tags { display: flex; gap: 6px; flex-wrap: wrap; }
        .tag { padding: 3px 8px; border-radius: 10px; font-size: 11px; background: rgba(255,107,157,0.1); color: #c44569; }
        .phrase-actions { display: flex; gap: 8px; }
        .action-btn { width: 32px; height: 32px; border-radius: 50%; border: none; background: white; cursor: pointer; font-size: 16px; transition: all 0.3s; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .action-btn:hover { transform: scale(1.1); }
        .action-btn.copied { background: #4CAF50; color: white; }
        .action-btn.favorited { background: #ff6b9d; color: white; }
        .ranking-list { display: flex; flex-direction: column; gap: 10px; }
        .ranking-item { display: flex; align-items: center; padding: 12px; background: #f8f8f8; border-radius: 12px; transition: all 0.3s; cursor: pointer; }
        .ranking-item:hover { background: #fff0f3; }
        .rank-number { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; margin-right: 12px; }
        .rank-number.top3 { background: linear-gradient(135deg, #FFD700, #FFA500); color: white; }
        .rank-number.normal { background: #e0e0e0; color: #666; }
        .rank-content { flex: 1; }
        .rank-text { font-size: 14px; color: #333; margin-bottom: 4px; }
        .rank-stats { font-size: 12px; color: #999; }
        .empty-state { text-align: center; padding: 40px; color: #999; }
        .empty-state-emoji { font-size: 48px; margin-bottom: 10px; }
        .input-section { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px 20px; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); z-index: 100; }
        .input-container { max-width: 600px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
        .input-wrapper { flex: 1; background: #f5f5f5; border-radius: 20px; padding: 10px 15px; display: flex; align-items: flex-end; gap: 10px; }
        .message-input { flex: 1; border: none; background: transparent; font-size: 15px; resize: none; outline: none; max-height: 100px; min-height: 24px; }
        .input-actions { display: flex; gap: 8px; }
        .input-action-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: white; cursor: pointer; font-size: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .send-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: linear-gradient(135deg, #ff6b9d, #c44569); color: white; font-size: 20px; cursor: pointer; transition: all 0.3s; }
        .send-btn:hover { transform: scale(1.05); }
        .image-preview { display: flex; gap: 10px; margin-top: 10px; overflow-x: auto; }
        .preview-item { position: relative; width: 80px; height: 80px; border-radius: 10px; overflow: hidden; }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .preview-remove { position: absolute; top: 5px; right: 5px; width: 20px; height: 20px; border-radius: 50%; background: rgba(0,0,0,0.5); color: white; border: none; cursor: pointer; font-size: 12px; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 25px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 1000; }
        .toast.show { opacity: 1; }
        #imageInput { display: none; }
        .time-badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border-radius: 12px; font-size: 12px; margin-bottom: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <div class="logo">
                <div class="logo-icon">💕</div>
                <div class="logo-text">恋爱大师</div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="favoritesBtn" title="我的收藏">⭐</button>
                <button class="icon-btn" id="rankingBtn" title="排行榜">🏆</button>
            </div>
        </div>
        <div class="mode-tabs">
            <button class="mode-tab active" data-mode="reply">💬 帮我回复</button>
            <button class="mode-tab" data-mode="express">💝 帮我表达</button>
            <button class="mode-tab" data-mode="quotes">📖 恋爱语录</button>
            <button class="mode-tab" data-mode="open">🎯 搭讪话术</button>
        </div>
    </div>
    
    <div class="main-content">
        <div class="persona-section">
            <div class="section-title">🎭 选择你的人设</div>
            <div class="persona-grid" id="personaGrid"></div>
        </div>
        
        <div class="category-section" id="categorySection">
            <div class="section-title">📂 选择场景</div>
            <div class="category-grid" id="categoryGrid"></div>
        </div>
        
        <div class="ranking-section hidden" id="rankingSection">
            <div class="section-title">🏆 热门话术排行榜</div>
            <div class="time-badge" id="timeBadge">🌅 早晨推荐</div>
            <div class="ranking-list" id="rankingList"></div>
        </div>
        
        <div class="favorites-section hidden" id="favoritesSection">
            <div class="section-title">⭐ 我的收藏</div>
            <div id="favoritesList"></div>
        </div>
        
        <div class="phrases-section" id="phrasesSection">
            <div class="phrases-header">
                <div class="section-title">💡 推荐回复</div>
                <div class="filter-tabs">
                    <button class="filter-tab active" data-filter="hot">🔥 热门</button>
                    <button class="filter-tab" data-filter="new">✨ 最新</button>
                    <button class="filter-tab" data-filter="match">🎯 匹配</button>
                </div>
            </div>
            <div id="phrasesList"></div>
        </div>
    </div>
    
    <div class="input-section">
        <div class="input-container">
            <div class="input-wrapper">
                <textarea class="message-input" id="messageInput" placeholder="粘贴对方的消息，或描述你想表达的内容..." rows="1"></textarea>
                <div class="input-actions">
                    <button class="input-action-btn" id="imageBtn" title="上传图片">📷</button>
                </div>
            </div>
            <button class="send-btn" id="sendBtn" title="生成回复">💝</button>
        </div>
        <div class="image-preview" id="imagePreview"></div>
    </div>
    
    <input type="file" id="imageInput" accept="image/*" multiple>
    <div class="toast" id="toast"></div>

    <script>
